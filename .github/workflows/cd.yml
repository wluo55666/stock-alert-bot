name: CD - Deploy to Home Server

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    name: Build and Run Locally
    runs-on: self-hosted # This targets your idle machine!

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- UPDATED FOR JAVA 24 ---
      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin' 

      - name: Build the JAR file
        # Compiles the Java 24 code and creates the .jar so Docker can find it
        run: ./gradlew build -x test 
      # ---------------------------

      - name: Deploy via Docker Compose
        env:
          APP_SYMBOLS: ${{ secrets.APP_SYMBOLS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          mkdir -p $HOME/.docker-ci-temp
          echo '{"auths": {}}' > $HOME/.docker-ci-temp/config.json
          export DOCKER_CONFIG=$HOME/.docker-ci-temp
          
          echo "APP_SYMBOLS=${APP_SYMBOLS}" > .env
          echo "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}" >> .env
          echo "TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}" >> .env
          echo "GEMINI_API_KEY=${GEMINI_API_KEY}" >> .env
          echo "TAVILY_API_KEY=${TAVILY_API_KEY}" >> .env
          
          docker-compose down
          docker-compose up -d --build
          docker image prune -f
