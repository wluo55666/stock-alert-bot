name: CD - Deploy to Home Server

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    name: Build and Run Locally
    runs-on: self-hosted # This targets your idle machine!

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- UPDATED FOR JAVA 24 ---
      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin' 

      - name: Build the JAR file
        # Compiles the Java 24 code and creates the .jar so Docker can find it
        run: ./gradlew build -x test 
      # ---------------------------

      - name: Deploy via Docker Compose
        run: |
          mkdir -p $HOME/.docker-ci-temp
          echo '{"auths": {}}' > $HOME/.docker-ci-temp/config.json
          export DOCKER_CONFIG=$HOME/.docker-ci-temp
          
          docker-compose down
          docker-compose up -d --build
          docker image prune -f
