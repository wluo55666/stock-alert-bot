name: CD - Deploy to Home Server

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    name: Build and Run Locally
    runs-on: self-hosted # This targets your idle machine!

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via Docker Compose
        run: |
          # 1. Create a temporary, empty Docker config to bypass the Mac Keychain
          mkdir -p $HOME/.docker-ci-temp
          echo '{"auths": {}}' > $HOME/.docker-ci-temp/config.json
          
          # 2. Force Docker to use this empty config
          export DOCKER_CONFIG=$HOME/.docker-ci-temp
          
          # 3. Execute your deployment using the hyphenated command
          docker-compose down
          docker-compose up -d --build
          docker image prune -f
