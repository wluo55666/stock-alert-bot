name: CD - Deploy to Home Server

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    name: Build and Run Locally
    runs-on: self-hosted # This targets your idle machine!

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via Docker Compose
        run: |
          # Tear down the old containers
          docker compose down
          
          # Rebuild the bot image with the new code and start services in the background
          docker compose up -d --build --no-cache
          
          # Optional: Clean up old unused Docker images to save disk space
          docker image prune -f