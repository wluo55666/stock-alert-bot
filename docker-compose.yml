services:
  app:
    build: .
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - APP_SYMBOLS=${APP_SYMBOLS}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
