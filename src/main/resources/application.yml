spring:
  application:
    name: stock-alert-bot
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: localhost
      port: 6379
logging:
  level:
    root: INFO
    com.weiluo: DEBUG

app:
  symbols: ${APP_SYMBOLS:AAPL,MSFT,TSLA}
  sliding-window:
    duration-seconds: 300
    threshold-percent: 0.05
  ta4j:
    bar-duration-seconds: 900
    rsi-timeframe: 14
    macd-short: 12
    macd-long: 26
    macd-signal: 9
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    chat-id: ${TELEGRAM_CHAT_ID:}
    api-base-url: ${TELEGRAM_API_BASE_URL:https://api.telegram.org}
